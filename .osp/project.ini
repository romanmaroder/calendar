[calendar]

app_start_command = 
base_url          = http://192.168.0.21
bind_ip           = 192.168.0.21
environment       = System
http_engine       = Apache
php_engine        = PHP-8.4
project_enabled   = on
project_root      = {base_dir}
server_aliases    = calendar calendar.local 192.168.0.21
terminal_codepage = 65001
tls_cert_file     = auto
tls_enabled       = off
tls_key_file      = auto
web_root          = D:\OSPanel\home\calendar\public
